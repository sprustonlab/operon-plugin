# Project Team workflow manifest. Defines the phase ordering, advance
# checks, and workflow-embedded rules for the multi-agent team flow.
# Notes on conventions:
#
#   - Rule triggers use the `mcp__operon__` MCP tool prefix.
#   - The Coordinator-spec-edit rule matches `.operon` run-dir paths
#     (it also accepts the legacy run-dir layout; see the regex on the
#     specification-phase rule below).
#   - No `hints:` block is declared -- the pipeline-hints system is out
#     of scope here.
#
# `${ARTIFACT_DIR}` in advance-check paths is substituted from the
# active run's `state.json` (set via `set_artifact_dir` MCP tool) at
# advance-check evaluation time. See `workflow._inject_seam_params`.

workflow_id: project_team
main_role: coordinator

phases:
  - id: vision
    file: vision
    advance_checks:
      - type: manual-confirm
        prompt: "Vision approved by user?"
  - id: setup
    file: setup
    advance_checks:
      - type: artifact-dir-ready-check
        on_failure:
          message: "Artifact directory not set -- call `set_artifact_dir(...)` MCP tool before advancing."
      - type: file-exists-check
        path: "${ARTIFACT_DIR}/STATUS.md"
      - type: file-exists-check
        path: "${ARTIFACT_DIR}/userprompt.md"
  - id: leadership
    file: leadership
  - id: specification
    file: specification
    advance_checks:
      - type: file-exists-check
        path: "${ARTIFACT_DIR}/specification/SPECIFICATION.md"
      - type: manual-confirm
        prompt: "Specification approved by user?"
    # No `hints:` block is declared here ("Synthesize all Leadership
    # findings before presenting to user"); the hints subsystem is out
    # of scope.
  - id: implementation
    file: implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All Leadership agents approve implementation?"
  - id: testing-vision
    file: testing_vision
    advance_checks:
      - type: file-exists-check
        path: "${ARTIFACT_DIR}/userprompt_testing.md"
      - type: manual-confirm
        prompt: "Testing vision approved by user?"
  - id: testing-specification
    file: testing_specification
    advance_checks:
      - type: file-exists-check
        path: "${ARTIFACT_DIR}/specification/TEST_SPECIFICATION.md"
      - type: manual-confirm
        prompt: "Test specification approved by user?"
  - id: testing-implementation
    file: testing_implementation
    advance_checks:
      - type: manual-confirm
        prompt: "All tests passing and compliant with testing standard?"
  - id: documentation
    file: documentation
    advance_checks:
      - type: manual-confirm
        prompt: "Documentation complete and reviewed?"
  - id: signoff
    file: signoff

rules:
  - id: no_direct_code_coordinator
    trigger: PreToolUse/Write
    enforcement: warn
    detect:
      field: file_path
      pattern: ".+"
    exclude_if_matches: "\\.(md|gitignore)$"
    message: "Coordinator should delegate code writing to Implementer agents"
    roles: [coordinator]

  - id: no_direct_spec_edit_coordinator
    trigger: [PreToolUse/Edit, PreToolUse/Write]
    enforcement: warn
    detect:
      field: file_path
      pattern: "(?i)(?:\\.project_team|\\.operon)/[^/]+/(?:.*/)?spec[^/]*\\.md$"
    message: >-
      Coordinator should delegate spec edits to a Leadership/Implementer agent
      rather than editing artifact spec files directly.
    roles: [coordinator]

  - id: no_push_before_testing
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push"
    message: "Code should not be pushed before it reaches the testing phase."
    exclude_phases: [testing-implementation, documentation, signoff]

  - id: no_force_push
    trigger: PreToolUse/Bash
    enforcement: deny
    detect:
      pattern: "git push\\s.*(--force-with-lease|--force\\b|-f\\b)"
    message: "Force push is never allowed"

  - id: no_close_leadership
    trigger: PreToolUse/mcp__operon__close_agent
    enforcement: warn
    message: >-
      Do not close agents during active workflow phases. Agents carry context
      that is lost on close. Wait until signoff phase.
    roles: [coordinator]
    exclude_phases: [signoff]
