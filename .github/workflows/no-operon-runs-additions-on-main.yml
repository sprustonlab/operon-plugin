name: Block operon-runs/ additions on main

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject PR if it adds or modifies operon-runs/ paths
        run: |
          set -euo pipefail
          base="origin/${{ github.event.pull_request.base.ref }}"
          # --diff-filter=AM = additions or modifications only.
          # Deletions (cleanup PRs) are allowed.
          violators=$(git diff --name-only --diff-filter=AM "${base}...HEAD" | grep '^operon-runs/' || true)
          if [ -n "$violators" ]; then
            echo "ERROR: This PR adds or modifies operon-runs/ paths."
            echo "operon-runs/ is develop-only audit-trail material and must not land on main."
            echo ""
            echo "Violating paths:"
            printf '  %s\n' $violators
            exit 1
          fi
          echo "OK: no operon-runs/ additions in this PR."
